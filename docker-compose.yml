services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/lib/mssql/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -No -b"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - loans-net

  api:
    build:
      context: ./Back
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5016"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=LoansDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "MakersLoans"
      Jwt__Audience: "MakersLoansClient"
      Jwt__ExpirationMinutes: "60"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "5016:5016"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - loans-net

  front:
    build:
      context: ./Front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://localhost:7253"
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - loans-net

networks:
  loans-net:

volumes:
  sqldata:
